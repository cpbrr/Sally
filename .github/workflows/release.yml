# Builds release artifacts for both supported platforms (design §12, §14):
# - Windows 11 x64: portable ZIP (sally.exe + sample .env + docs)
# - macOS 14+ Apple Silicon: .app in a DMG (unsigned unless Developer ID
#   secrets are configured — signing/notarization per design §12.2 is a
#   separate step once certificates exist)
#
# Runs on version tags (v*) and manually via workflow_dispatch.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npx tauri build --no-bundle
      - name: Package portable ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging | Out-Null
          Copy-Item src-tauri/target/release/sally.exe staging/Sally.exe
          Copy-Item .env.example staging/.env.example
          Copy-Item README.md staging/README.md
          Compress-Archive -Path staging/* -DestinationPath Sally-windows-x64-portable.zip -Force
          (Get-FileHash Sally-windows-x64-portable.zip -Algorithm SHA256).Hash |
            Out-File -Encoding ascii Sally-windows-x64-portable.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: sally-windows-x64-portable
          path: |
            Sally-windows-x64-portable.zip
            Sally-windows-x64-portable.zip.sha256

  macos:
    # Windows is the current focus; build macOS only on manual dispatch.
    # macos-26: the screencapturekit crate's apple-metal Swift bridge
    # compiles against the Xcode 26 SDK (MTLSamplerReductionMode et al.).
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Bundle onnxruntime dylib (load-dynamic on macOS — see Cargo.toml)
        # ort-sys's default download-then-static-link strategy broke for
        # aarch64-apple-darwin on this runner (its downloaded artifact for
        # this target isn't actually a static archive). macOS instead
        # dlopen()s this bundled copy at runtime (lib.rs's ort::init_from,
        # tauri.macos.conf.json's resource bundling) — same ONNX Runtime
        # version ort-sys itself targets, from its official release, not
        # ort-sys's own (differently-formatted) CDN copy.
        run: |
          curl -L -o onnxruntime.tgz \
            https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-osx-arm64-1.24.2.tgz
          tar -xzf onnxruntime.tgz
          mkdir -p src-tauri/onnxruntime
          cp -L onnxruntime-osx-arm64-1.24.2/lib/libonnxruntime.dylib src-tauri/onnxruntime/libonnxruntime.dylib
      - run: npx tauri build --target aarch64-apple-darwin --bundles app
      - name: Ad-hoc sign the app bundle
        # No Developer ID certificate (design §12.2, still pending) — an
        # ad-hoc signature has no trusted identity behind it, so Gatekeeper
        # still flags the app as from an unidentified developer, but it's
        # enough for TCC (Screen Recording / audio capture permission
        # prompts) to work, and it avoids the harsher "app is damaged, move
        # to trash" wording unsigned + quarantined apps get on newer macOS.
        run: |
          codesign --force --deep --sign - \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Sally.app"
      - name: Build DMG
        run: |
          mkdir -p dmg-staging
          cp -R "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Sally.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname Sally -srcfolder dmg-staging -ov -format UDZO \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Sally-macos-aarch64.dmg"
      - name: Checksums
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          shasum -a 256 Sally-macos-aarch64.dmg > Sally-macos-aarch64.dmg.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: sally-macos-aarch64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Sally-macos-aarch64.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Sally-macos-aarch64.dmg.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            Sally-windows-x64-portable.zip
            Sally-windows-x64-portable.zip.sha256
            *.dmg
            *.dmg.sha256
